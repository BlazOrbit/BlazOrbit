# .github/workflows/preview-publish.yml
# Publishes preview versions automatically on each relevant push to develop.
# Version is read from <VersionPrefix> in Directory.Build.props
# and suffixed with -preview.<run-number>.

name: '[Release] Preview Publish'

on:
  push:
    branches: [develop]
    paths-ignore:
      # Documentation and metadata
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      # Workflows that do not affect preview packages
      - '.github/workflows/codeql.yml'
      - '.github/workflows/docs-api.yml'
      - '.github/workflows/docs-site.yml'
      - '.github/workflows/release-gate.yml'
      - '.github/workflows/release-publish.yml'
      # Non-packable code and dev tools
      - 'test/**'
      - 'tools/**'
      - 'scripts/**'
      # Static assets and repo configuration
      - 'assets/**'
      - 'coverage.runsettings'
      - 'TestResults/**'
      - '.editorconfig'
      - '.gitattributes'
      - '.gitignore'

  workflow_dispatch:
    inputs:
      override_version:
        description: 'Override preview version (e.g. 1.0.0-preview1). Leave empty for auto-calculation.'
        required: false
        type: string

env:
  DOTNET_VERSION: |
    8.0.x
    10.0.x
  NUGET_SOURCE: 'https://api.nuget.org/v3/index.json'

permissions:
  contents: write

concurrency:
  group: preview-publish
  cancel-in-progress: false

jobs:
  guard:
    name: Branch Guard
    runs-on: ubuntu-latest
    steps:
      - name: Enforce develop branch
        run: |
          if [ "${{ github.ref }}" != "refs/heads/develop" ]; then
            echo "::error::Preview publish can only run on the develop branch. Current: ${{ github.ref }}"
            exit 1
          fi
          echo "✅ Branch guard passed"

  version:
    name: Calculate Version
    runs-on: ubuntu-latest
    needs: guard
    outputs:
      version: ${{ steps.calc.outputs.version }}
      full_version: ${{ steps.calc.outputs.full_version }}
      assembly_version: ${{ steps.calc.outputs.assembly_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Calculate preview version
        id: calc
        env:
          OVERRIDE_VERSION: ${{ github.event.inputs.override_version }}
        run: |
          # Helper: extract assembly-friendly version (strip prerelease suffix, ensure 4 parts)
          extract_assembly_version() {
            local v="$1"
            v="${v%%-*}"
            local parts=(${v//./ })
            echo "${parts[0]:-0}.${parts[1]:-0}.${parts[2]:-0}.${parts[3]:-0}"
          }

          # If a manual override was provided, use it directly
          if [ -n "$OVERRIDE_VERSION" ]; then
            echo "Using manually specified version: $OVERRIDE_VERSION"
            echo "version=$OVERRIDE_VERSION" >> $GITHUB_OUTPUT
            echo "full_version=${OVERRIDE_VERSION}+${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT
            echo "bump_type=MANUAL" >> $GITHUB_OUTPUT
            echo "assembly_version=$(extract_assembly_version "$OVERRIDE_VERSION")" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Read VersionPrefix from Directory.Build.props
          VERSION_PREFIX=$(grep -oP '<VersionPrefix>\K[^<]+' Directory.Build.props || echo "")
          if [ -z "$VERSION_PREFIX" ]; then
            echo "::error::Could not read <VersionPrefix> from Directory.Build.props"
            exit 1
          fi

          echo "VersionPrefix: $VERSION_PREFIX"

          # Use run number as preview counter (always increasing, no collision risk)
          VERSION="${VERSION_PREFIX}-preview.${GITHUB_RUN_NUMBER}"
          FULL_VERSION="${VERSION_PREFIX}-preview.${GITHUB_RUN_NUMBER}+${GITHUB_SHA:0:7}"

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "full_version=$FULL_VERSION" >> $GITHUB_OUTPUT
          echo "bump_type=PREVIEW" >> $GITHUB_OUTPUT
          echo "assembly_version=$(extract_assembly_version "$VERSION_PREFIX")" >> $GITHUB_OUTPUT

          echo "Calculated version: $VERSION"

  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: [guard, version]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install WASM workload
        run: dotnet workload install wasm-tools

      - name: Restore dependencies
        run: dotnet restore BlazOrbit.slnx

      - name: Build BuildTools (Release)
        run: dotnet build src/BlazOrbit.BuildTools/BlazOrbit.BuildTools.csproj -c Release --no-restore -p:TreatWarningsAsErrors=true

      - name: Build (Release)
        run: dotnet build BlazOrbit.slnx -c Release --no-restore -p:TreatWarningsAsErrors=true

      - name: Test
        run: dotnet test BlazOrbit.slnx -c Release --no-build --verbosity normal

  pack:
    name: Pack NuGet Packages
    runs-on: ubuntu-latest
    needs: [version, build-and-test]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install WASM workload
        run: dotnet workload install wasm-tools

      - name: Restore dependencies
        run: dotnet restore BlazOrbit.slnx

      - name: Pack packages
        run: |
          dotnet pack BlazOrbit.slnx \
            -c Release \
            --no-restore \
            -p:Version=${{ needs.version.outputs.version }} \
            -p:AssemblyVersion=${{ needs.version.outputs.assembly_version }} \
            -p:FileVersion=${{ needs.version.outputs.assembly_version }} \
            -p:InformationalVersion=${{ needs.version.outputs.full_version }} \
            -p:ContinuousIntegrationBuild=true \
            -o ./artifacts

      - name: Upload packages
        uses: actions/upload-artifact@v7
        with:
          name: packages-${{ needs.version.outputs.version }}
          path: ./artifacts/*.nupkg
          retention-days: 30

  publish:
    name: Publish to NuGet
    runs-on: ubuntu-latest
    needs: [version, pack]
    environment: preview
    steps:
      - name: Download packages
        uses: actions/download-artifact@v8
        with:
          name: packages-${{ needs.version.outputs.version }}
          path: ./artifacts

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Push to NuGet
        run: |
          dotnet nuget push ./artifacts/*.nupkg \
            --source ${{ env.NUGET_SOURCE }} \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --skip-duplicate
