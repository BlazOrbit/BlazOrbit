# .github/workflows/preview-publish.yml
# Publishes preview versions automatically on each push to develop
# Version calculated based on merged PR labels:
#   - If any PR has 'changes/public-api' label since last tag: X.(Y+1).0-preview.N
#   - Otherwise: X.Y.(Z+1)-preview.N
# N = commits since last tag on master

name: '[Release] Preview Publish'

on:
  push:
    branches: [develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'

  workflow_dispatch:
    inputs:
      override_version:
        description: 'Override preview version (e.g. 1.0.0-preview1). Leave empty for auto-calculation from last master tag.'
        required: false
        type: string

env:
  DOTNET_VERSION: |
    8.0.x
    10.0.x
  NUGET_SOURCE: 'https://api.nuget.org/v3/index.json'

permissions:
  contents: write
  pull-requests: read  # Needed to read PR labels for semver calculation

concurrency:
  group: preview-publish
  cancel-in-progress: false

jobs:
  guard:
    name: Branch Guard
    runs-on: ubuntu-latest
    steps:
      - name: Enforce develop branch
        run: |
          if [ "${{ github.ref }}" != "refs/heads/develop" ]; then
            echo "::error::Preview publish can only run on the develop branch. Current: ${{ github.ref }}"
            exit 1
          fi
          echo "✅ Branch guard passed"

  version:
    name: Calculate Version
    runs-on: ubuntu-latest
    needs: guard
    outputs:
      version: ${{ steps.calc.outputs.version }}
      full_version: ${{ steps.calc.outputs.full_version }}
    steps:
      - name: Checkout with full history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Calculate preview version
        id: calc
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OVERRIDE_VERSION: ${{ github.event.inputs.override_version }}
        run: |
          # If a manual override was provided, use it directly
          if [ -n "$OVERRIDE_VERSION" ]; then
            echo "Using manually specified version: $OVERRIDE_VERSION"
            echo "version=$OVERRIDE_VERSION" >> $GITHUB_OUTPUT
            echo "full_version=${OVERRIDE_VERSION}+${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT
            echo "bump_type=MANUAL" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Get last tag on master (format vX.Y.Z)
          LAST_TAG=$(git describe --tags --abbrev=0 --match "v[0-9]*.[0-9]*.[0-9]" origin/master 2>/dev/null || echo "")

          if [ -z "$LAST_TAG" ]; then
            echo "::warning::No release tag found on master. Using v0.0.0 as base."
            echo "::warning::Create an initial tag (e.g., git tag v0.0.0) to establish versioning."
            LAST_TAG="v0.0.0"
          fi

          echo "Last tag on master: $LAST_TAG"

          # Parse version
          MAJOR=$(echo $LAST_TAG | cut -d. -f1 | tr -d 'v')
          MINOR=$(echo $LAST_TAG | cut -d. -f2)
          PATCH=$(echo $LAST_TAG | cut -d. -f3)

          # Check for public API changes by examining merged PR labels
          echo "Checking merged PRs for public API changes..."
          HAS_PUBLIC_API=false

          if [ "$LAST_TAG" != "v0.0.0" ]; then
            # Get merge commits since last tag
            MERGE_COMMITS=$(git log "$LAST_TAG"..HEAD --merges --format="%H" 2>/dev/null || true)

            if [ -n "$MERGE_COMMITS" ]; then
              for sha in $MERGE_COMMITS; do
                # Get PRs associated with this merge commit
                PR_DATA=$(gh api "/repos/${{ github.repository }}/commits/$sha/pulls" --jq '.[] | select(.state == "closed") | {number: .number, labels: [.labels[].name]}' 2>/dev/null || true)

                if [ -n "$PR_DATA" ]; then
                  # Check if any label is 'changes/public-api'
                  HAS_LABEL=$(echo "$PR_DATA" | grep -q '"changes/public-api"' && echo "true" || echo "false")
                  if [ "$HAS_LABEL" = "true" ]; then
                    HAS_PUBLIC_API=true
                    echo "  Found PR with changes/public-api label in commit $sha"
                    break
                  fi
                fi
              done
            fi
          fi

          # Calculate next version based on PR labels
          if [ "$HAS_PUBLIC_API" = "true" ]; then
            NEXT_MINOR=$((MINOR + 1))
            NEXT_PATCH=0
            BUMP_TYPE="MINOR"
            echo "Public API changes detected → MINOR bump"
          else
            NEXT_MINOR=$MINOR
            NEXT_PATCH=$((PATCH + 1))
            BUMP_TYPE="PATCH"
            echo "No public API changes → PATCH bump"
          fi

          # Count commits since last tag (handle when tag doesn't exist)
          if git rev-parse "$LAST_TAG" >/dev/null 2>&1; then
            COMMITS=$(git rev-list --count "$LAST_TAG"..HEAD)
          else
            COMMITS=$(git rev-list --count HEAD)
          fi

          # Build version
          VERSION="${MAJOR}.${NEXT_MINOR}.${NEXT_PATCH}-preview.${COMMITS}"
          FULL_VERSION="${MAJOR}.${NEXT_MINOR}.${NEXT_PATCH}-preview.${COMMITS}+${GITHUB_SHA:0:7}"

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "full_version=$FULL_VERSION" >> $GITHUB_OUTPUT
          echo "bump_type=$BUMP_TYPE" >> $GITHUB_OUTPUT

          echo "Calculated version: $VERSION ($BUMP_TYPE bump)"

  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: [guard, version]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install WASM workload
        run: dotnet workload install wasm-tools

      - name: Restore dependencies
        run: dotnet restore BlazOrbit.slnx

      - name: Build (Release)
        run: dotnet build BlazOrbit.slnx -c Release --no-restore -p:TreatWarningsAsErrors=true

      - name: Test
        run: dotnet test BlazOrbit.slnx -c Release --no-build --verbosity normal

  pack:
    name: Pack NuGet Packages
    runs-on: ubuntu-latest
    needs: [version, build-and-test]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore BlazOrbit.slnx

      - name: Pack packages
        run: |
          dotnet pack BlazOrbit.slnx \
            -c Release \
            --no-restore \
            -p:Version=${{ needs.version.outputs.version }} \
            -p:AssemblyVersion=${{ needs.version.outputs.version }} \
            -p:FileVersion=${{ needs.version.outputs.version }} \
            -p:InformationalVersion=${{ needs.version.outputs.full_version }} \
            -p:ContinuousIntegrationBuild=true \
            -o ./artifacts

      - name: Upload packages
        uses: actions/upload-artifact@v7
        with:
          name: packages-${{ needs.version.outputs.version }}
          path: ./artifacts/*.nupkg
          retention-days: 30

  publish:
    name: Publish to NuGet
    runs-on: ubuntu-latest
    needs: [version, pack]
    environment: preview
    steps:
      - name: Download packages
        uses: actions/download-artifact@v8
        with:
          name: packages-${{ needs.version.outputs.version }}
          path: ./artifacts

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Push to NuGet
        run: |
          dotnet nuget push ./artifacts/*.nupkg \
            --source ${{ env.NUGET_SOURCE }} \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --skip-duplicate

      - name: Create GitHub Release (Preview)
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: Preview ${{ needs.version.outputs.version }}
          body: |
            ## Preview Release ${{ needs.version.outputs.version }}
            
            Development version automatically built from `develop`.
            
            ```bash
            dotnet add package BlazOrbit --version ${{ needs.version.outputs.version }}
            ```
            
            ⚠️ **Unstable - do not use in production**
          prerelease: true
          files: ./artifacts/*.nupkg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
