# .github/workflows/release-gate.yml
# Quality gates for releases - runs on PRs to master
# Verifies build, test and public API before merging to master

name: '[Quality] Release Gate'

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened, labeled, unlabeled]

  workflow_dispatch:
    inputs:
      check_only:
        description: 'Solo verificar, no bloquear'
        type: boolean
        default: false

permissions:
  contents: read
  issues: read

concurrency:
  group: release-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ARCH-15: build + test on both Linux and Windows. Publishing still happens
  # only from Linux (release-publish.yml), but the gate verifies both platforms
  # before any tag can advance to publish.
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install WASM workload
        run: dotnet workload install wasm-tools

      - name: Restore dependencies
        run: dotnet restore BlazOrbit.slnx

      - name: Build (Release)
        run: dotnet build BlazOrbit.slnx -c Release --no-restore -p:TreatWarningsAsErrors=true

      - name: Audit vulnerable NuGet packages (SEC-09)
        run: |
          # Block the release if any direct or transitive NuGet package has a
          # high/critical advisory. Output is captured so the failure shows
          # the offending package; `dotnet list` exits 0 even when vulns
          # exist, so we grep the output ourselves.
          set -e
          echo "Auditing direct dependencies..."
          dotnet list BlazOrbit.slnx package --vulnerable 2>&1 | tee vuln-direct.log
          echo "Auditing transitive dependencies..."
          dotnet list BlazOrbit.slnx package --vulnerable --include-transitive 2>&1 | tee vuln-transitive.log

          if grep -E "\b(Critical|High)\b" vuln-direct.log vuln-transitive.log; then
            echo "::error::High/Critical vulnerability detected in NuGet dependencies. See logs above."
            exit 1
          fi
          echo "No High/Critical vulnerabilities."

  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install WASM workload
        run: dotnet workload install wasm-tools

      - name: Restore dependencies
        run: dotnet restore BlazOrbit.slnx

      - name: Build (Release)
        run: dotnet build BlazOrbit.slnx -c Release --no-restore -p:TreatWarningsAsErrors=true

  tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install WASM workload
        run: dotnet workload install wasm-tools

      - name: Restore dependencies
        run: dotnet restore BlazOrbit.slnx

      - name: Build (Release)
        run: dotnet build BlazOrbit.slnx -c Release --no-restore -p:TreatWarningsAsErrors=true

      - name: Test
        run: dotnet test BlazOrbit.slnx -c Release --no-build --verbosity normal

  public-api-shipped-check:
    name: Check Public API Shipped
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify PublicAPI.Shipped.txt was not modified
        run: |
          echo "=== Verifying PublicAPI.Shipped.txt integrity ==="

          # PublicAPI.Shipped.txt should only be modified during release
          # by the admin-tools.ps1 Move-PublicApiToShipped function.
          SHIPPED_CHANGES=$(git diff --name-only origin/master...HEAD | grep -i "PublicAPI.Shipped.txt" || true)

          if [ -n "$SHIPPED_CHANGES" ]; then
            echo "❌ ERROR: PublicAPI.Shipped.txt was modified"
            echo "This file must only be updated during the release process."
            echo "Modified files:"
            echo "$SHIPPED_CHANGES"
            exit 1
          else
            echo "✅ No changes to PublicAPI.Shipped.txt"
          fi

  summary:
    name: Release Gate Summary
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, tests, public-api-shipped-check]
    if: always()

    steps:
      - name: Generate summary
        uses: actions/github-script@v9
        with:
          script: |
            const jobs = {
              buildLinux: '${{ needs.build-linux.result }}',
              buildWindows: '${{ needs.build-windows.result }}',
              tests: '${{ needs.tests.result }}',
              publicApiShipped: '${{ needs.public-api-shipped-check.result }}'
            };

            let allPassed = true;
            let report = '## Release Gate Results\n\n';

            for (const [name, result] of Object.entries(jobs)) {
              const icon = result === 'success' ? '✅' : result === 'skipped' ? '⏭️' : '⚠️';
              report += `- ${icon} **${name}**: ${result}\n`;
              if (result !== 'success' && result !== 'skipped') {
                allPassed = false;
              }
            }

            report += '\n';

            if (allPassed) {
              report += '### ✅ Release Gate Passed\n\n';
              report += 'Code meets all requirements for release.';
            } else {
              report += '### ❌ Release Gate Failed\n\n';
              report += 'There are issues that must be resolved before release.';
            }

            core.summary.addRaw(report).write();

            if (!allPassed) {
              core.setFailed('Release gate failed');
            }
