# .github/workflows/docs-site.yml
# Builds the BlazOrbit Docs site (Blazor WASM) and publishes it to Cloudflare Pages.
# Triggered manually (workflow_dispatch).

name: '[Docs] Official Site (Cloudflare)'

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - preview

env:
  DOTNET_VERSION: '10.0.100'

concurrency:
  group: docs-site
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          global-json-file: global.json

      - name: Setup Node.js (required for BuildTools/Vite)
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install wasm-tools workload (required for AOT)
        run: dotnet workload install wasm-tools

      - name: Restore BuildTools
        run: dotnet restore src/BlazOrbit.BuildTools/BlazOrbit.BuildTools.csproj

      - name: Restore Docs.Wasm
        run: dotnet restore docs/BlazOrbit.Docs.Wasm/BlazOrbit.Docs.Wasm.csproj

      - name: Publish Docs.Wasm
        run: >
          dotnet publish
          docs/BlazOrbit.Docs.Wasm/BlazOrbit.Docs.Wasm.csproj
          -c Release
          -o ./publish
          --no-restore
          -p:RunAOTCompilation=false

      - name: List static assets for debug
        run: |
          echo "=== Published wwwroot structure ==="
          find ./publish/wwwroot -type f | sort

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./publish/wwwroot --project-name=blazorbit-docs-site --branch=${{ github.event.inputs.environment == 'production' && 'master' || 'preview' }}
