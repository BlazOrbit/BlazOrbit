# .github/workflows/release-publish.yml
# Publishes stable releases on tags v*
# Creates GitHub release and publishes to NuGet

name: '[Release] Stable Publish'

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: true
        type: string

env:
  DOTNET_VERSION: |
    8.0.x
    10.0.x
  NUGET_SOURCE: 'https://api.nuget.org/v3/index.json'

permissions:
  contents: write

concurrency:
  group: release-publish
  cancel-in-progress: false

jobs:
  version:
    name: Resolve Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: Validate context and resolve version
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.ref }}" != "refs/heads/master" ]; then
            echo "::error::Manual stable release can only be triggered from the master branch. Current: ${{ github.ref }}"
            exit 1
          fi

          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "✅ Resolved version: $VERSION"

  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Validate trigger context
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.ref }}" != "refs/heads/master" ]; then
            echo "::error::Manual stable release can only be triggered from master."
            exit 1
          fi
          echo "✅ Context validated"

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install WASM workload
        run: dotnet workload install wasm-tools

      - name: Restore dependencies
        run: dotnet restore BlazOrbit.slnx

      - name: Build (Release)
        run: dotnet build BlazOrbit.slnx -c Release --no-restore -p:TreatWarningsAsErrors=true

      - name: Test
        run: dotnet test BlazOrbit.slnx -c Release --no-build --verbosity normal

  pack:
    name: Pack NuGet Packages
    runs-on: ubuntu-latest
    needs: [build-and-test, version]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore BlazOrbit.slnx

      - name: Pack packages
        run: |
          # Capture pack output to scan for NU5xxx packaging warnings (PKG-07).
          # Baseline today is clean; any new warning blocks the release until
          # justified or NoWarn'd in csproj with a comment.
          set -o pipefail
          dotnet pack BlazOrbit.slnx \
            -c Release \
            --no-restore \
            -p:Version=${{ needs.version.outputs.version }} \
            -p:AssemblyVersion=${{ needs.version.outputs.version }} \
            -p:FileVersion=${{ needs.version.outputs.version }} \
            -p:InformationalVersion=${{ needs.version.outputs.version }} \
            -p:ContinuousIntegrationBuild=true \
            -o ./artifacts \
            2>&1 | tee pack.log

      - name: Audit NU5xxx packaging warnings
        run: |
          # Fail the release if dotnet pack emitted any NU5xxx warning. These
          # diagnose structural issues in the produced .nupkg
          # (NU5104 prerelease deps, NU5128 framework mismatch, NU5100 non-
          # standard assembly placement, NU5110/NU5111 naming). See PKG-07.
          if grep -E "warning NU5[0-9]+" pack.log; then
            echo "::error::NU5xxx packaging warning detected. Review pack.log."
            exit 1
          fi
          echo "No NU5xxx warnings."

      - name: Validate package structure
        run: |
          # Per-package structural assertions. Catches regressions where a
          # csproj refactor silently drops `lib/`, `build/`, `staticwebassets/`,
          # or the README/icon. Each assertion is a fatal block. See PKG-04.
          set -e

          assert_in_pkg() {
            local pkg="$1"
            shift
            local missing=0
            for path in "$@"; do
              if ! unzip -l "$pkg" | awk '{print $4}' | grep -Fxq "$path"; then
                echo "::error::$pkg is missing $path"
                missing=1
              fi
            done
            return $missing
          }

          VERSION="${{ needs.version.outputs.version }}"

          for tfm in net8.0 net10.0; do
            echo "=== Validating $tfm ==="

            PKG=./artifacts/BlazOrbit.${VERSION}.nupkg
            assert_in_pkg "$PKG" \
              "lib/$tfm/BlazOrbit.dll" \
              "lib/$tfm/BlazOrbit.xml" \
              "build/BlazOrbit.targets" \
              "staticwebassets/css/blazorbit.css" \
              "README.md" \
              "icon.png"

            PKG=./artifacts/BlazOrbit.Core.${VERSION}.nupkg
            assert_in_pkg "$PKG" \
              "lib/$tfm/BlazOrbit.Core.dll" \
              "lib/$tfm/BlazOrbit.Core.xml" \
              "README.md" \
              "icon.png"

            PKG=./artifacts/BlazOrbit.SyntaxHighlight.${VERSION}.nupkg
            assert_in_pkg "$PKG" \
              "lib/$tfm/BlazOrbit.SyntaxHighlight.dll" \
              "README.md" \
              "icon.png"

            PKG=./artifacts/BlazOrbit.Localization.Server.${VERSION}.nupkg
            assert_in_pkg "$PKG" \
              "lib/$tfm/BlazOrbit.Localization.Server.dll" \
              "README.md" \
              "icon.png"

            PKG=./artifacts/BlazOrbit.Localization.Wasm.${VERSION}.nupkg
            assert_in_pkg "$PKG" \
              "lib/$tfm/BlazOrbit.Localization.Wasm.dll" \
              "README.md" \
              "icon.png"
          done

          echo "All packages have the expected structure."

      - name: Upload packages
        uses: actions/upload-artifact@v7
        with:
          name: packages-${{ needs.version.outputs.version }}
          path: ./artifacts/*.nupkg
          retention-days: 30

  publish:
    name: Publish to NuGet
    runs-on: ubuntu-latest
    needs: [version, pack]
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download packages
        uses: actions/download-artifact@v8
        with:
          name: packages-${{ needs.version.outputs.version }}
          path: ./artifacts

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Push to NuGet
        run: |
          dotnet nuget push ./artifacts/*.nupkg \
            --source ${{ env.NUGET_SOURCE }} \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --skip-duplicate

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          # Capture the body of the `## [VERSION]` section: skip the header,
          # stop at the next `## [` heading or the link-reference footer
          # (`---`). Fail loudly if the section is missing so a mistagged
          # release does not ship empty notes.
          sed -n "/^## \[$VERSION\]/,\$p" CHANGELOG.md \
            | sed -n '2,$p' \
            | sed -e '/^## \[/,$d' -e '/^---$/,$d' \
            > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "::error::CHANGELOG.md is missing a [$VERSION] section" >&2
            exit 1
          fi
          # Enumerate the packages we just packed (REL-09: no hardcoded list).
          # The `.nupkg` filenames are `<PackageId>.<Version>.nupkg`; strip the
          # version suffix to recover each id. `.snupkg` files are attached but
          # not listed — symbol packages are not user-installable.
          {
            echo ''
            echo '### Packages'
            for nupkg in ./artifacts/*.nupkg; do
              [ -e "$nupkg" ] || continue
              filename=$(basename "$nupkg" .nupkg)
              package_id=${filename%."$VERSION"}
              echo "- $package_id"
            done
            echo ''
            echo '### Installation'
            echo '```bash'
            echo "dotnet add package BlazOrbit --version $VERSION"
            echo '```'
          } >> RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ startsWith(github.ref_name, 'v') && github.ref_name || format('v{0}', needs.version.outputs.version) }}
          name: Release ${{ needs.version.outputs.version }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          files: ./artifacts/*.nupkg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
