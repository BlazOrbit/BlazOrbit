# .github/workflows/release-publish.yml
# Publishes stable releases on tags v*
# Creates GitHub release and publishes to NuGet

name: Release Publish

on:
  push:
    tags: ['v*']

env:
  DOTNET_VERSION: '10.0.100'
  NUGET_SOURCE: 'https://api.nuget.org/v3/index.json'

permissions:
  contents: write

concurrency:
  group: release-publish
  cancel-in-progress: false

jobs:
  version:
    name: Extract Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - name: Extract version from tag
        id: extract
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION"

  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: version
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install WASM workload
        run: dotnet workload install wasm-tools

      - name: Restore dependencies
        run: dotnet restore CdCSharp.BlazorBit.slnx

      - name: Build (Release)
        run: dotnet build CdCSharp.BlazorBit.slnx -c Release --no-restore -p:TreatWarningsAsErrors=true

      - name: Test
        run: dotnet test CdCSharp.BlazorBit.slnx -c Release --no-build --verbosity normal

  pack:
    name: Pack NuGet Packages
    runs-on: ubuntu-latest
    needs: [version, build-and-test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore CdCSharp.BlazorBit.slnx

      - name: Pack packages
        run: |
          # Capture pack output to scan for NU5xxx packaging warnings (PKG-07).
          # Baseline today is clean; any new warning blocks the release until
          # justified or NoWarn'd in csproj with a comment.
          set -o pipefail
          dotnet pack CdCSharp.BlazorBit.slnx \
            -c Release \
            --no-restore \
            -p:Version=${{ needs.version.outputs.version }} \
            -p:AssemblyVersion=${{ needs.version.outputs.version }} \
            -p:FileVersion=${{ needs.version.outputs.version }} \
            -p:InformationalVersion=${{ needs.version.outputs.version }} \
            -p:ContinuousIntegrationBuild=true \
            -o ./artifacts \
            2>&1 | tee pack.log

      - name: Audit NU5xxx packaging warnings
        run: |
          # Fail the release if dotnet pack emitted any NU5xxx warning. These
          # diagnose structural issues in the produced .nupkg
          # (NU5104 prerelease deps, NU5128 framework mismatch, NU5100 non-
          # standard assembly placement, NU5110/NU5111 naming). See PKG-07.
          if grep -E "warning NU5[0-9]+" pack.log; then
            echo "::error::NU5xxx packaging warning detected. Review pack.log."
            exit 1
          fi
          echo "No NU5xxx warnings."

      - name: Validate package structure
        run: |
          # Per-package structural assertions. Catches regressions where a
          # csproj refactor silently drops `lib/`, `build/`, `staticwebassets/`,
          # or the README/icon. Each assertion is a fatal block. See PKG-04.
          set -e

          assert_in_pkg() {
            local pkg="$1"
            shift
            local missing=0
            for path in "$@"; do
              if ! unzip -l "$pkg" | awk '{print $4}' | grep -Fxq "$path"; then
                echo "::error::$pkg is missing $path"
                missing=1
              fi
            done
            return $missing
          }

          PKG=./artifacts/CdCSharp.BlazorBit.${{ needs.version.outputs.version }}.nupkg
          assert_in_pkg "$PKG" \
            "lib/net10.0/CdCSharp.BlazorBit.dll" \
            "lib/net10.0/CdCSharp.BlazorBit.xml" \
            "build/CdCSharp.BlazorBit.targets" \
            "staticwebassets/css/blazorbit.css" \
            "README.md" \
            "icon.png"

          PKG=./artifacts/CdCSharp.BlazorBit.Core.${{ needs.version.outputs.version }}.nupkg
          assert_in_pkg "$PKG" \
            "lib/net10.0/CdCSharp.BlazorBit.Core.dll" \
            "lib/net10.0/CdCSharp.BlazorBit.Core.xml" \
            "README.md" \
            "icon.png"

          PKG=./artifacts/CdCSharp.BlazorBit.SyntaxHighlight.${{ needs.version.outputs.version }}.nupkg
          assert_in_pkg "$PKG" \
            "lib/net10.0/CdCSharp.BlazorBit.SyntaxHighlight.dll" \
            "README.md" \
            "icon.png"

          PKG=./artifacts/CdCSharp.BlazorBit.Localization.Server.${{ needs.version.outputs.version }}.nupkg
          assert_in_pkg "$PKG" \
            "lib/net10.0/CdCSharp.BlazorBit.Localization.Server.dll" \
            "README.md" \
            "icon.png"

          PKG=./artifacts/CdCSharp.BlazorBit.Localization.Wasm.${{ needs.version.outputs.version }}.nupkg
          assert_in_pkg "$PKG" \
            "lib/net10.0/CdCSharp.BlazorBit.Localization.Wasm.dll" \
            "README.md" \
            "icon.png"

          echo "All packages have the expected structure."

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ needs.version.outputs.version }}
          path: ./artifacts/*.nupkg
          retention-days: 30

  publish:
    name: Publish to NuGet
    runs-on: ubuntu-latest
    needs: [version, pack]
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: packages-${{ needs.version.outputs.version }}
          path: ./artifacts

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Push to NuGet
        run: |
          dotnet nuget push ./artifacts/*.nupkg \
            --source ${{ env.NUGET_SOURCE }} \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --skip-duplicate

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          VERSION='${{ needs.version.outputs.version }}'
          # Capture the body of the `## [VERSION]` section: skip the header,
          # stop at the next `## [` heading or the link-reference footer
          # (`---`). Fail loudly if the section is missing so a mistagged
          # release does not ship empty notes.
          sed -n "/^## \[$VERSION\]/,\$p" CHANGELOG.md \
            | sed -n '2,$p' \
            | sed -e '/^## \[/,$d' -e '/^---$/,$d' \
            > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "::error::CHANGELOG.md is missing a [$VERSION] section" >&2
            exit 1
          fi
          # Enumerate the packages we just packed (REL-09: no hardcoded list).
          # The `.nupkg` filenames are `<PackageId>.<Version>.nupkg`; strip the
          # version suffix to recover each id. `.snupkg` files are attached but
          # not listed — symbol packages are not user-installable.
          {
            echo ''
            echo '### Packages'
            for nupkg in ./artifacts/*.nupkg; do
              [ -e "$nupkg" ] || continue
              filename=$(basename "$nupkg" .nupkg)
              package_id=${filename%."$VERSION"}
              echo "- $package_id"
            done
            echo ''
            echo '### Installation'
            echo '```bash'
            echo "dotnet add package CdCSharp.BlazorBit --version $VERSION"
            echo '```'
          } >> RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ needs.version.outputs.version }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          files: ./artifacts/*.nupkg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
