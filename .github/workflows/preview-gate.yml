# .github/workflows/preview-gate.yml
# Quality gates for previews - runs on PRs to develop
# Verifies build, test and public API before merging to develop

name: '[Quality] Preview Gate'

on:
  pull_request:
    branches: [develop]
    types: [opened, synchronize, reopened]

  workflow_dispatch:

env:
  DOTNET_VERSION: |
    8.0.x
    10.0.x

permissions:
  contents: read
  pull-requests: write  # Needed to add labels
  actions: read

concurrency:
  group: preview-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  router:
    uses: ./.github/workflows/_runner-router.yml
    secrets: inherit

  build-linux:
    name: Build Linux
    needs: router
    runs-on: ${{ needs.router.outputs.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install WASM workload
        run: dotnet workload install wasm-tools

      - name: Restore dependencies
        run: dotnet restore BlazOrbit.slnx

      - name: Build BuildTools (Release)
        run: dotnet build src/BlazOrbit.BuildTools/BlazOrbit.BuildTools.csproj -c Release --no-restore -p:TreatWarningsAsErrors=true

      - name: Build (Release)
        run: dotnet build BlazOrbit.slnx -c Release --no-restore -p:TreatWarningsAsErrors=true

  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install WASM workload
        run: dotnet workload install wasm-tools

      - name: Restore dependencies
        run: dotnet restore BlazOrbit.slnx

      - name: Build BuildTools (Release)
        run: dotnet build src/BlazOrbit.BuildTools/BlazOrbit.BuildTools.csproj -c Release --no-restore -p:TreatWarningsAsErrors=true

      - name: Build (Release)
        run: dotnet build BlazOrbit.slnx -c Release --no-restore -p:TreatWarningsAsErrors=true

  tests:
    name: Tests
    needs: router
    runs-on: ${{ needs.router.outputs.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install WASM workload
        run: dotnet workload install wasm-tools

      - name: Restore dependencies
        run: dotnet restore BlazOrbit.slnx

      - name: Build BuildTools (Release)
        run: dotnet build src/BlazOrbit.BuildTools/BlazOrbit.BuildTools.csproj -c Release --no-restore -p:TreatWarningsAsErrors=true

      - name: Build (Release)
        run: dotnet build BlazOrbit.slnx -c Release --no-restore -p:TreatWarningsAsErrors=true

      - name: Test
        run: dotnet test BlazOrbit.slnx -c Release --no-build --verbosity normal

  public-api-shipped-check:
    name: Check Public API Shipped
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify PublicAPI.Shipped.txt was not modified
        run: |
          echo "=== Verifying PublicAPI.Shipped.txt integrity ==="

          # PublicAPI.Shipped.txt should only be modified during release
          # by the admin-tools.ps1 Move-PublicApiToShipped function.
          SHIPPED_CHANGES=$(git diff --name-only origin/develop...HEAD | grep -i "PublicAPI.Shipped.txt" || true)

          if [ -n "$SHIPPED_CHANGES" ]; then
            echo "❌ ERROR: PublicAPI.Shipped.txt was modified"
            echo "This file must only be updated during the release process."
            echo "Modified files:"
            echo "$SHIPPED_CHANGES"
            exit 1
          else
            echo "✅ No changes to PublicAPI.Shipped.txt"
          fi

  summary:
    name: Preview Gate Summary
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, tests, public-api-shipped-check]
    if: always()

    steps:
      - name: Generate summary
        uses: actions/github-script@v9
        with:
          script: |
            const jobs = {
              buildLinux: '${{ needs.build-linux.result }}',
              buildWindows: '${{ needs.build-windows.result }}',
              tests: '${{ needs.tests.result }}',
              publicApiShipped: '${{ needs.public-api-shipped-check.result }}'
            };

            let allPassed = true;
            let report = '## Preview Gate Results\n\n';

            for (const [name, result] of Object.entries(jobs)) {
              const icon = result === 'success' ? '✅' : result === 'skipped' ? '⏭️' : '⚠️';
              report += `- ${icon} **${name}**: ${result}\n`;
              if (result !== 'success' && result !== 'skipped') {
                allPassed = false;
              }
            }

            report += '\n';

            if (allPassed) {
              report += '### ✅ Preview Gate Passed\n\n';
              report += 'Ready to merge into develop.';
            } else {
              report += '### ❌ Preview Gate Failed\n\n';
              report += 'There are issues that need to be resolved.';
            }

            core.summary.addRaw(report).write();

            if (!allPassed) {
              core.setFailed('Preview gate failed');
            }
